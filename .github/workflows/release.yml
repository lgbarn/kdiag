name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check if release needed
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing v${VERSION}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - uses: actions/setup-go@v5
        if: steps.version.outputs.skip == 'false'
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        if: steps.version.outputs.skip == 'false'
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip notice
        if: steps.version.outputs.skip == 'true'
        run: echo "::notice::VERSION file (v${{ steps.version.outputs.version }}) matches latest tag — bump VERSION to release."
